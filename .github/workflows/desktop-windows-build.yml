name: Desktop Windows build (manual)

# One-off Windows build of the Tauri desktop app for internal testing.
# Not wired to GitHub Releases or the auto-updater — it produces an
# unsigned .msi/.exe you download from this workflow run's Artifacts
# tab and hand to people directly. For a real signed Windows release
# (with auto-update support), the updater private key would need to be
# added as a repo secret and this workflow updated to use it.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install Python deps (incl. PyInstaller)
        run: uv sync --extra dev

      - name: Build sidecar executable
        run: uv run pyinstaller repo-translator-sidecar.spec

      - name: Copy sidecar into Tauri externalBin location
        shell: pwsh
        run: |
          $triple = "x86_64-pc-windows-msvc"
          $dest = "desktop/src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "dist/repo-translator-sidecar.exe" "$dest/repo-translator-sidecar-$triple.exe"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Build Tauri app (unsigned, no updater artifacts)
        working-directory: desktop
        shell: bash
        run: npm run tauri build -- --config "{\"bundle\":{\"createUpdaterArtifacts\":false}}"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
